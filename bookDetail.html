<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Textbook Guid</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <header>
        
            <div class="logo">

                <a href="/index.html" class="logo-link">
                   <span class="logo-text" style="size:55px; "><b>Textbook Guid</b></span>
                </a>
            </div>     
            <div class="signin">
                <button class="signup_login">
                    Signup/Login
                </button>
            </div>
        
       
        
    </header>
    <main>
        
            
                <div class="book-Info">
                    <div>
                        <img src="" alt="" id="CoverImg" height="183" width="120">
                    </div>
                   
                    <div id="b-I">
                       <h2 id="bk-name"></h2>
                       <h5 id="auth-name"></h5>

                       <h2>Overview</h2>
                         <div id="ov-book">
                      
                         </div>
                    </div>
                    
                    
                </div>
                
            
       
    </main>
    <footer>&#169; Textbook Guide</footer>
    
</body>
<script >
     const Books =[{id:"book1" , title:"Computer Architecture A Quantitative Approach" ,
            author:"John L. Hennessy ,David A. Patterson" , cover:"assets/71zrCDfb73S._SL1500_.jpg" , overview:"The book systematically explores the layers of computer design through a consistent framework of performance analysis."},{id:"book2" , title:"Digital Design and Computer Architecture" ,
            author:"Author:David Money Harris ,Sarah L. Harris" , cover:"assets/images.jpeg"},{id:"book3" , title:"Inside The Machine" ,
            author:"Author:Jon Stokes" , cover:"assets/images (1).jpeg"}];
  const param = new URLSearchParams(window.location.search);
  const key = param.get("key");
  const bk = Books.find(b => b.id === key);

  
  document.getElementById('CoverImg').src = bk.cover;
  document.getElementById('bk-name').textContent = bk.title;
  document.getElementById('auth-name').textContent = bk.author;
  document.getElementById('ov-book').textContent = bk.overview;
</script>
  
</html>
